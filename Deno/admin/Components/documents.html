<!-- Edit Document Modal -->
<div id="edit-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content edit-modal">
        <div class="modal-header">
            <h2>Edit Document</h2>
            <button class="close-btn" id="close-edit-modal">&times;</button>
        </div>
        <form id="edit-form" method="PUT" enctype="multipart/form-data">
            <div class="form-group">
                <label for="edit-title">Title</label>
                <input type="text" id="edit-title" name="title" required placeholder="Enter document title">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="edit-authorInput">Author</label>
                    <div class="dropdown">
                        <input type="text" id="edit-authorInput" name="authorInput" placeholder="Type to search authors...">
                        <div class="dropdown-list" id="edit-authorList"></div>
                    </div>
                    <div class="select-container">
                        <div class="selected-authors" id="edit-selectedAuthors"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-publication_date">Publication Date</label>
                    <input type="date" id="edit-publication_date" name="publication_date" required>
                </div>
            </div>

            <div class="form-group">
                <label for="edit-volume">Volume</label>
                <input type="text" id="edit-volume" name="volume" required placeholder="Enter volume number">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="edit-topicInput">Topic</label>
                    <div class="dropdown">
                        <input type="text" id="edit-topicInput" name="topicInput" placeholder="Type to search topics...">
                        <div class="dropdown-list" id="edit-topicList"></div>
                    </div>
                    <div class="select-container">
                        <div class="selected-topics" id="edit-selectedTopics"></div>
                    </div>
                </div>
                <div class="form-group">
                    <label for="edit-category">Category</label>
                    <select id="edit-category" name="category" required>
                        <option value="default">Select Category</option>
                        <option value="thesis">Thesis</option>
                        <option value="dissertation">Dissertation</option>
                        <option value="confluence">Confluence</option>
                        <option value="synergy">Synergy</option>
                    </select>
                </div>
            </div>

            <div class="upload-icons-container">
                <label for="edit-file" class="upload-file">
                    <div class="upload-box">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="icon icon-tabler icons-tabler-outline icon-tabler-paperclip">
                            <path stroke="none" d="M0 0h24v24H0z" fill="none"/>
                            <path d="M15 7l-6.5 6.5a1.5 1.5 0 0 0 3 3l6.5 -6.5a3 3 0 0 0 -6 -6l-6.5 6.5a4.5 4.5 0 0 0 9 9l6.5 -6.5"/>
                        </svg>
                        <p>Change File</p>
                    </div>
                    <input type="file" id="edit-file" name="file" accept=".pdf" style="display: none;">
                </label>
            </div>

            <div class="modal-footer">
                <button type="button" class="cancel-btn" id="cancel-edit">Cancel</button>
                <button type="submit" class="update-btn">Update</button>
            </div>
        </form>
    </div>
</div>

<!-- Success Modal -->
<div id="edit-success-modal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48">
            <path fill="#4caf50" d="M44,24c0,11.045-8.955,20-20,20S4,35.045,4,24S12.955,4,24,4S44,12.955,44,24z"></path>
            <path fill="#ccff90" d="M34.602,14.602L21,28.199l-5.602-5.598l-2.797,2.797L21,33.801l16.398-16.402L34.602,14.602z"></path>
        </svg>
        <h2>Updated successfully!</h2>
        <p>Your document has been updated successfully.</p>
    </div>
</div>
